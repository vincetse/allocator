on:
  - push
  - pull_request

env:
  packages: automake autoconf cppcheck libboost-test-dev make valgrind

jobs:
  focal:
    runs-on: "ubuntu-20.04"
    strategy:
      fail-fast: true
      matrix:
        include:
          - gcc: 7
          - gcc: 8
          - gcc: 9
          - gcc: 10
          - gcc: 11
          - gcc: 12

    steps:
      - uses: actions/checkout@v2

      - name: Install GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: ${{ matrix.gcc }}

      - name: Show G++ version
        run: |
          g++ --version

      - name: Install packages
        run: |
          sudo apt-get install -qq -y \
            ${{ env.packages }}
        env:
          DEBIAN_FRONTEND: "noninteractive"

      - name: cppcheck
        run: |
          cppcheck \
            --enable=performance,portability,information,style,missingInclude \
            .

      - name: autotools
        run: |
          autoreconf -if
          ./configure
          make
          make check

  jammy:
    runs-on: "ubuntu-22.04"
    strategy:
      fail-fast: true
      matrix:
        include:
          - gcc: 9
          - gcc: 10
          - gcc: 11
          - gcc: 12

    steps:
      - uses: actions/checkout@v2

      - name: Install GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: ${{ matrix.gcc }}

      - name: Show G++ version
        run: |
          g++ --version

      - name: Install packages
        run: |
          sudo apt-get install -qq -y \
            ${{ env.packages }}
        env:
          DEBIAN_FRONTEND: "noninteractive"

      - name: cppcheck
        run: |
          cppcheck \
            --enable=performance,portability,information,style,missingInclude \
            .

      - name: autotools
        run: |
          autoreconf -if
          ./configure
          make
          make check
